name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Lint and type-check the API ─────────────────────────────────────
  api-lint:
    name: API — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  # ── API unit tests ───────────────────────────────────────────────────
  api-test:
    name: API — Unit Tests
    runs-on: ubuntu-latest
    needs: api-lint
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm test -- --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: api/coverage/

  # ── Chaincode unit tests ─────────────────────────────────────────────
  chaincode-test:
    name: Chaincode — Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Test anomaly detector
        run: cd blockchain/chaincode/anomaly && go mod tidy && go test ./... -v -count=1
      - name: Test property validator
        run: cd blockchain/chaincode/property && go mod tidy && go test ./... -v -count=1
      - name: Test access enforcer
        run: cd blockchain/chaincode/access && go mod tidy && go test ./... -v -count=1
      - name: Test ZKP verifier
        run: cd blockchain/chaincode/zkp && go mod tidy && go test ./... -v -count=1

  # ── Frontend build check ─────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [public-dashboard, citizen-dashboard, officer-console, admin-panel]
    defaults:
      run:
        working-directory: frontend/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build

  # ── Prototype build check ────────────────────────────────────────────
  prototype-build:
    name: Prototype — Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bsc-prototype
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build

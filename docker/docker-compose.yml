# Full BSC stack: Fabric network + PostgreSQL + Redis + API gateway
# Run from repo root: docker compose -f docker/docker-compose.yml --project-name bsc up

networks:
  bsc-fabric-net:
    name: bsc-fabric-net

volumes:
  orderer.bsc.gov:
  peer0.itdept.bsc.gov:
  peer0.registrar.bsc.gov:
  peer0.mca.bsc.gov:
  postgres-data:
  redis-data:

services:

  # ── Fabric Orderer ───────────────────────────────────────────────
  orderer.bsc.gov:
    container_name: orderer.bsc.gov
    image: hyperledger/fabric-orderer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=file
      - ORDERER_GENERAL_BOOTSTRAPFILE=/var/hyperledger/orderer/orderer.genesis.block
    working_dir: /root
    command: orderer
    volumes:
      - ../blockchain/network/channel-artifacts/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ../blockchain/network/crypto-config/ordererOrganizations/bsc.gov/orderers/orderer.bsc.gov/msp:/var/hyperledger/orderer/msp
      - ../blockchain/network/crypto-config/ordererOrganizations/bsc.gov/orderers/orderer.bsc.gov/tls:/var/hyperledger/orderer/tls
      - orderer.bsc.gov:/var/hyperledger/production/orderer
    ports:
      - 7050:7050
    networks:
      - bsc-fabric-net

  # ── Fabric Peers ─────────────────────────────────────────────────
  peer0.itdept.bsc.gov:
    container_name: peer0.itdept.bsc.gov
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=bsc-fabric-net
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.itdept.bsc.gov
      - CORE_PEER_ADDRESS=peer0.itdept.bsc.gov:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.itdept.bsc.gov:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.itdept.bsc.gov:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.itdept.bsc.gov:7051
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_PEER_LOCALMSPID=ITDeptMSP
      - CORE_LEDGER_STATE_STATEDATABASE=leveldb
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../blockchain/network/crypto-config/peerOrganizations/itdept.bsc.gov/peers/peer0.itdept.bsc.gov/msp:/etc/hyperledger/fabric/msp
      - ../blockchain/network/crypto-config/peerOrganizations/itdept.bsc.gov/peers/peer0.itdept.bsc.gov/tls:/etc/hyperledger/fabric/tls
      - peer0.itdept.bsc.gov:/var/hyperledger/production
    command: peer node start
    ports:
      - 7051:7051
    depends_on:
      - orderer.bsc.gov
    networks:
      - bsc-fabric-net

  peer0.registrar.bsc.gov:
    container_name: peer0.registrar.bsc.gov
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=bsc-fabric-net
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.registrar.bsc.gov
      - CORE_PEER_ADDRESS=peer0.registrar.bsc.gov:8051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:8051
      - CORE_PEER_CHAINCODEADDRESS=peer0.registrar.bsc.gov:8052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:8052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.registrar.bsc.gov:8051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.registrar.bsc.gov:8051
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_PEER_LOCALMSPID=RegistrarMSP
      - CORE_LEDGER_STATE_STATEDATABASE=leveldb
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../blockchain/network/crypto-config/peerOrganizations/registrar.bsc.gov/peers/peer0.registrar.bsc.gov/msp:/etc/hyperledger/fabric/msp
      - ../blockchain/network/crypto-config/peerOrganizations/registrar.bsc.gov/peers/peer0.registrar.bsc.gov/tls:/etc/hyperledger/fabric/tls
      - peer0.registrar.bsc.gov:/var/hyperledger/production
    command: peer node start
    ports:
      - 8051:8051
    depends_on:
      - orderer.bsc.gov
    networks:
      - bsc-fabric-net

  peer0.mca.bsc.gov:
    container_name: peer0.mca.bsc.gov
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=bsc-fabric-net
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.mca.bsc.gov
      - CORE_PEER_ADDRESS=peer0.mca.bsc.gov:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.mca.bsc.gov:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.mca.bsc.gov:9051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.mca.bsc.gov:9051
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_PEER_LOCALMSPID=MCAMSP
      - CORE_LEDGER_STATE_STATEDATABASE=leveldb
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../blockchain/network/crypto-config/peerOrganizations/mca.bsc.gov/peers/peer0.mca.bsc.gov/msp:/etc/hyperledger/fabric/msp
      - ../blockchain/network/crypto-config/peerOrganizations/mca.bsc.gov/peers/peer0.mca.bsc.gov/tls:/etc/hyperledger/fabric/tls
      - peer0.mca.bsc.gov:/var/hyperledger/production
    command: peer node start
    ports:
      - 9051:9051
    depends_on:
      - orderer.bsc.gov
    networks:
      - bsc-fabric-net

  # ── CLI (for peer admin commands) ───────────────────────────────
  cli:
    container_name: bsc-cli
    image: hyperledger/fabric-tools:2.5
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.itdept.bsc.gov:7051
      - CORE_PEER_LOCALMSPID=ITDeptMSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/itdept.bsc.gov/users/Admin@itdept.bsc.gov/msp
      - CORE_PEER_TLS_ROOTCERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/itdept.bsc.gov/peers/peer0.itdept.bsc.gov/tls/ca.crt
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: /bin/bash
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../blockchain/network/crypto-config:/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto
      - ../blockchain/network/channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
      - ../blockchain/chaincode:/opt/gopath/src/github.com/hyperledger/fabric/peer/chaincode
    depends_on:
      - peer0.itdept.bsc.gov
      - peer0.registrar.bsc.gov
      - peer0.mca.bsc.gov
    networks:
      - bsc-fabric-net

  # ── PostgreSQL (off-chain index) ─────────────────────────────────
  postgres:
    container_name: bsc-postgres
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bsc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bsc_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-bsc_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../database/migrations:/docker-entrypoint-initdb.d
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bsc"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bsc-fabric-net

  # ── Redis (session + response cache) ────────────────────────────
  redis:
    container_name: bsc-redis
    image: redis:7
    command: redis-server --requirepass ${REDIS_PASSWORD:-bsc_redis_dev}
    volumes:
      - redis-data:/data
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bsc-fabric-net

  # ── API Gateway ──────────────────────────────────────────────────
  api:
    container_name: bsc-api
    build:
      context: ../api
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://bsc:bsc_dev_password@postgres:5432/bsc_db
      - REDIS_URL=redis://:bsc_redis_dev@redis:6379
      - JWT_SECRET=${JWT_SECRET:-change_this_in_production_32chars_min}
      - FABRIC_CHANNEL=bsc-channel
      - FABRIC_PEER_ENDPOINT=peer0.itdept.bsc.gov:7051
      - FABRIC_MSP_ID=ITDeptMSP
      - FABRIC_CRYPTO_PATH=/fabric/crypto
    volumes:
      - ../blockchain/network/crypto-config:/fabric/crypto
    ports:
      - 4000:4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      peer0.itdept.bsc.gov:
        condition: service_started
    networks:
      - bsc-fabric-net
